<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMeet — Real-Time Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --zoom-blue: #0b5cff; --bg: #f4f5f9; --border: #e2e2eb; --text: #131619; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; }

        /* Sidebar Navigation */
        .rail { width: 70px; background: #1a1d21; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; }
        .rail-btn { color: #9ca3af; font-size: 24px; cursor: pointer; }
        .rail-btn.active { color: white; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; }

        /* Contacts Panel */
        .contacts-panel { width: 300px; background: white; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel-header { padding: 20px; font-weight: 700; font-size: 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .add-area { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .add-area input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; }
        
        #contact-list { flex: 1; overflow-y: auto; }
        .contact-item { display: flex; align-items: center; gap: 12px; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #fafafa; transition: 0.2s; }
        .contact-item:hover { background: #f0f7ff; }
        .contact-item.active { background: #e8f0fe; border-left: 4px solid var(--zoom-blue); }
        .avatar { width: 40px; height: 40px; background: #526375; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { height: 70px; padding: 0 25px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 20px; background: #f9f9fb; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Bubbles */
        .bubble { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .bubble.sent { align-self: flex-end; background: var(--zoom-blue); color: white; border-bottom-right-radius: 2px; }
        .bubble.received { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .chat-input-area { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: #f0f2f5; outline: none; }

        /* Call UI */
        #call-ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; background: #222; }
        .call-controls { height: 120px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        .hangup-btn { background: #ff3b30; color: white; border: none; padding: 15px 40px; border-radius: 15px; cursor: pointer; font-weight: bold; }

        /* Login */
        #login-screen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; text-align: center; }
        .login-card input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; }
        .login-card button { width: 100%; padding: 15px; background: var(--zoom-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>ProMeet</h2>
            <input type="text" id="my-username" placeholder="Pick your username">
            <button onclick="initAccount()">Start Messaging</button>
        </div>
    </div>

    <div class="rail">
        <div class="rail-btn active">🏠</div>
        <div class="rail-btn">💬</div>
    </div>

    <div class="contacts-panel">
        <div class="panel-header">Contacts <span style="color:var(--zoom-blue); cursor:pointer;">+</span></div>
        <div class="add-area">
            <input type="text" id="new-contact-name" placeholder="Type username & press Enter" onkeydown="if(event.key==='Enter') saveContact()">
        </div>
        <div id="contact-list"></div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <div>
                <div id="target-display-name" style="font-weight: 700;">No contact selected</div>
                <div id="online-status" style="font-size: 12px; color: #888;">Offline</div>
            </div>
            <button onclick="startVideoCall()" style="background:none; border:none; font-size:24px; cursor:pointer;">📹</button>
        </div>
        <div class="chat-messages" id="chat-box"></div>
        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="border:none; background:none; color:var(--zoom-blue); font-weight:700; cursor:pointer;">Send</button>
        </div>
    </div>

    <div id="call-ui">
        <div class="video-grid">
            <video id="local-video" autoplay muted playsinline></video>
            <video id="remote-video" autoplay playsinline></video>
        </div>
        <div class="call-controls">
            <button class="hangup-btn" onclick="location.reload()">End Call</button>
        </div>
    </div>

<script>
    const $ = id => document.getElementById(id);
    let S = { 
        peer: null, 
        conn: null, 
        myID: '', 
        activeTarget: '', 
        contacts: JSON.parse(localStorage.getItem('saved_contacts') || '[]') 
    };

    // 1. Initialize Account
    function initAccount() {
        const user = $('my-username').value.trim();
        if(!user) return alert("Username required");
        
        S.myID = user;
        $('login-screen').classList.add('hidden');
        
        // Connect to PeerServer using the username as ID
        S.peer = new Peer(user, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        S.peer.on('open', () => console.log("Connected as " + S.myID));

        // Listen for Incoming Connections (Chat)
        S.peer.on('connection', conn => {
            S.conn = conn;
            S.activeTarget = conn.peer;
            handleIncomingData();
        });

        // Listen for Incoming Calls
        S.peer.on('call', async call => {
            if(confirm("Incoming call from " + call.peer)) {
                const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
                call.answer(stream);
                showCallUI(stream, call);
            }
        });

        renderContacts();
    }

    // 2. Add and Save Contact (The logic you asked for)
    function saveContact() {
        const name = $('new-contact-name').value.trim();
        if(!name || name === S.myID) return;

        if(!S.contacts.includes(name)) {
            S.contacts.push(name);
            localStorage.setItem('saved_contacts', JSON.stringify(S.contacts));
            renderContacts();
        }
        $('new-contact-name').value = '';
    }

    function renderContacts() {
        $('contact-list').innerHTML = S.contacts.map(name => `
            <div class="contact-item" onclick="selectContact('${name}')" id="item-${name}">
                <div class="avatar">${name[0].toUpperCase()}</div>
                <div style="font-weight:600;">${name}</div>
            </div>
        `).join('');
    }

    // 3. Connect to a specific contact
    function selectContact(name) {
        S.activeTarget = name;
        $('target-display-name').innerText = name;
        $('chat-box').innerHTML = '';
        
        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        $(`item-${name}`).classList.add('active');

        // Initiate data connection
        S.conn = S.peer.connect(name);
        handleIncomingData();
    }

    // 4. Messaging Logic
    function sendMsg() {
        const txt = $('message-input').value.trim();
        if(!txt || !S.conn) return;

        S.conn.send(txt);
        appendBubble(txt, true);
        $('message-input').value = '';
    }

    function handleIncomingData() {
        S.conn.on('open', () => $('online-status').innerText = "Online");
        S.conn.on('data', data => appendBubble(data, false));
    }

    function appendBubble(txt, isMine) {
        const b = document.createElement('div');
        b.className = `bubble ${isMine ? 'sent' : 'received'}`;
        b.innerText = txt;
        $('chat-box').appendChild(b);
        $('chat-box').scrollTop = $('chat-box').scrollHeight;
    }

    // 5. Video Call Logic
    async function startVideoCall() {
        if(!S.activeTarget) return alert("Select a contact");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            const call = S.peer.call(S.activeTarget, stream);
            showCallUI(stream, call);
        } catch(e) { alert("Camera error"); }
    }

    function showCallUI(localStream, call) {
        $('call-ui').style.display = 'flex';
        $('local-video').srcObject = localStream;
        call.on('stream', remoteStream => {
            $('remote-video').srcObject = remoteStream;
        });
    }
</script>
</body>
</html>
