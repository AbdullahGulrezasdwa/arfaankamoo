<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProMeet — Professional Team Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
:root {
  --sidebar-w: 70px; --list-w: 320px;
  --zoom-blue: #0b5cff; --bg-main: #ffffff;
  --bg-side: #f4f5f9; --text-dark: #131619;
  --text-dim: #747487; --border: #e2e2eb;
}
body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; background: #fff; }

.app-container { display: grid; grid-template-columns: var(--sidebar-w) var(--list-w) 1fr; height: 100vh; }

/* 1. Sidebar Rail */
.rail { background: #1a1d21; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; }
.rail-icon { font-size: 24px; color: #9ca3af; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 14px; }
.rail-icon.active { color: white; background: rgba(255,255,255,0.1); }

/* 2. Contacts Panel */
.contact-list { background: var(--bg-main); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.list-hdr { padding: 25px 20px 10px; font-weight: 700; font-size: 20px; display: flex; justify-content: space-between; align-items: center; }
.search-box { padding: 15px; }
.search-box input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: #f0f2f5; font-size: 14px; outline: none; }

.contact-item { display: flex; align-items: center; gap: 12px; padding: 15px 20px; cursor: pointer; transition: 0.1s; border-bottom: 1px solid #f9f9fb; }
.contact-item:hover { background: #f0f7ff; }
.contact-item.active { background: #e8f0fe; border-left: 4px solid var(--zoom-blue); }
.avatar { width: 44px; height: 44px; background: #526375; color: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

/* 3. Main Chat Window */
.chat-window { display: flex; flex-direction: column; background: #fff; }
.chat-hdr { height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
.chat-body { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f9f9fb; }
.chat-footer { padding: 20px 30px; border-top: 1px solid var(--border); }
.input-area { display: flex; align-items: center; background: #f0f2f5; border-radius: 24px; padding: 8px 20px; gap: 12px; }
.input-area input { flex: 1; border: none; background: transparent; outline: none; padding: 10px 0; font-size: 15px; }

/* WhatsApp Style Bubbles */
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
.bubble.mine { align-self: flex-end; background: var(--zoom-blue); color: white; border-bottom-right-radius: 2px; }
.bubble.theirs { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

/* 4. Call UI Overlay */
#call-overlay { position: fixed; inset: 0; background: #0b0e11; z-index: 5000; display: none; flex-direction: column; }
#video-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
.vid-box { background: #1c1f23; border-radius: 20px; overflow: hidden; position: relative; }
video { width: 100%; height: 100%; object-fit: cover; }
.call-tools { height: 110px; display: flex; justify-content: center; align-items: center; gap: 25px; }
.tool-btn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.tool-hangup { background: #ff3b30; color: white; width: 80px; border-radius: 18px; }

/* Auth Overlay */
#auth-screen { position: fixed; inset: 0; z-index: 9999; background: #fff; display: flex; align-items: center; justify-content: center; }
.auth-box { width: 360px; text-align: center; padding: 40px; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div style="font-size: 40px; margin-bottom: 10px;">📡</div>
    <h2 style="margin-bottom: 5px;">ProMeet Login</h2>
    <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 30px;">Login with your unique username.</p>
    <input type="text" id="username-input" placeholder="Enter Username" style="width:100%; padding:14px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px; font-size:16px; outline:none;">
    <button onclick="login()" style="width:100%; padding:14px; background:var(--zoom-blue); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer; font-size:16px;">Launch Account</button>
  </div>
</div>

<div class="app-container">
  <aside class="rail">
    <div class="rail-icon active">🏠</div>
    <div class="rail-icon">💬</div>
    <div class="rail-icon">👥</div>
    <div style="margin-top: auto;" class="rail-icon">⚙️</div>
  </aside>

  <aside class="contact-list">
    <div class="list-hdr">Team Chat <button onclick="addContact()" style="background:var(--zoom-blue); color:white; border:none; width:28px; height:28px; border-radius:8px; cursor:pointer;">+</button></div>
    <div class="search-box"><input type="text" id="add-contact-in" placeholder="Add contact username..." onkeydown="if(event.key==='Enter')addContact()"></div>
    <div id="contact-render-area" style="overflow-y: auto;"></div>
  </aside>

  <main class="chat-window">
    <div class="chat-hdr">
      <div>
        <div id="active-name" style="font-weight:700; font-size:18px;">Select a Conversation</div>
        <div id="active-status" style="font-size:12px; color:#4aae20;">Online</div>
      </div>
      <div style="display:flex; gap:20px; align-items:center;">
        <button onclick="startCall()" id="call-btn" style="background:none; border:none; font-size:24px; cursor:pointer;">📹</button>
        <button style="background:none; border:none; font-size:20px; color:var(--text-dim); cursor:pointer;">⋮</button>
      </div>
    </div>
    <div class="chat-body" id="chat-messages"></div>
    <div class="chat-footer">
      <div class="input-area">
        <input type="text" id="chat-entry" placeholder="Message..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" style="background:none; border:none; color:var(--zoom-blue); font-weight:700; cursor:pointer;">SEND</button>
      </div>
    </div>
  </main>
</div>

<div id="call-overlay">
  <div id="video-grid">
    <div class="vid-box"><video id="me-video" autoplay muted playsinline style="transform: scaleX(-1);"></video></div>
    <div class="vid-box"><video id="them-video" autoplay playsinline></video></div>
  </div>
  <div class="call-tools">
    <button class="tool-btn" style="background:#3c4043; color:white;">🎤</button>
    <button class="tool-btn" style="background:#3c4043; color:white;">📷</button>
    <button class="tool-btn tool-hangup" onclick="location.reload()">📞</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let S = {
  peer: null, conn: null, call: null,
  myID: '', target: '', 
  contacts: JSON.parse(localStorage.getItem('pm_contacts') || '[]')
};

// Auto-login if session exists
window.onload = () => {
  const last = localStorage.getItem('pm_user');
  if(last) { $('username-input').value = last; login(); }
};

function login() {
  const user = $('username-input').value.trim();
  if(!user) return;
  S.myID = user;
  localStorage.setItem('pm_user', user);
  $('auth-screen').classList.add('hidden');
  
  S.peer = new Peer(user, { config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }});
  
  S.peer.on('connection', c => {
    S.conn = c;
    setupChatListeners();
  });

  S.peer.on('call', async c => {
    if(confirm(`Incoming call from ${c.peer}. Answer?`)) {
      const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
      c.answer(stream);
      showCallUI(stream, c);
    }
  });

  renderContacts();
}

function addContact() {
  const val = $('add-contact-in').value.trim();
  if(val && val !== S.myID && !S.contacts.includes(val)) {
    S.contacts.push(val);
    localStorage.setItem('pm_contacts', JSON.stringify(S.contacts));
    renderContacts();
  }
  $('add-contact-in').value = '';
}

function renderContacts() {
  $('contact-render-area').innerHTML = S.contacts.map(c => `
    <div class="contact-item" onclick="openChat('${c}')" id="user-${c}">
      <div class="avatar">${c[0].toUpperCase()}</div>
      <div style="font-weight:600; font-size:14px;">${c}</div>
    </div>
  `).join('');
}

function openChat(id) {
  S.target = id;
  $('active-name').innerText = id;
  $('chat-messages').innerHTML = '';
  document.querySelectorAll('.contact-item').forEach(e => e.classList.remove('active'));
  $(`user-${id}`).classList.add('active');
  
  S.conn = S.peer.connect(id);
  setupChatListeners();
}

async function startCall() {
  if(!S.target) return alert("Select a contact first");
  const stream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
  const call = S.peer.call(S.target, stream);
  showCallUI(stream, call);
}

function showCallUI(stream, call) {
  $('call-overlay').style.display = 'flex';
  $('me-video').srcObject = stream;
  call.on('stream', rs => $('them-video').srcObject = rs);
  S.call = call;
}

function sendMessage() {
  const msg = $('chat-entry').value.trim();
  if(!msg || !S.conn) return;
  S.conn.send({ text: msg, from: S.myID });
  appendBubble(msg, true);
  $('chat-entry').value = '';
}

function setupChatListeners() {
  S.conn.on('data', data => {
    if(data.from === S.target) appendBubble(data.text, false);
  });
}

function appendBubble(text, isMe) {
  const div = document.createElement('div');
  div.className = `bubble ${isMe ? 'mine' : 'theirs'}`;
  div.innerText = text;
  $('chat-messages').appendChild(div);
  $('chat-messages').scrollTop = $('chat-messages').scrollHeight;
}
</script>
</body>
</html>
